version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Africa/Lagos"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      expo-sdk:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "@expo-google-fonts/*"
      react-navigation:
        patterns:
          - "@react-navigation/*"
      types-and-lint:
        dependency-type: "development"
        patterns:
          - "@types/*"
          - "eslint*"
          - "typescript"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
